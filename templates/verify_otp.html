{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="auth-card">
            <h2 class="auth-title">Verify Your Email</h2>
            <p class="auth-subtitle">We have sent a 6-digit OTP to your registered email address.</p>
            
            {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <form action="/verify-otp" method="post">
                <input type="hidden" name="username" value="{{ username }}">
                
                <div class="mb-4">
                    <label for="otp" class="form-label">Enter OTP Code</label>
                    <input type="text" class="form-control auth-input" id="otp" name="otp" required placeholder="123456" maxlength="6" pattern="\d{6}">
                </div>
                
                <button type="submit" class="btn btn-primary auth-btn">Verify and Login</button>
            </form>
            
            <div class="auth-links mt-4">
                <p>Didn't receive the code? Check your spam folder or <a href="/register">register again</a>.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
