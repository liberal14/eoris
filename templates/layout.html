<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EORIS - Explosive Ordnance Recognition & Identification System</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface-color: #1a1a1a;
            --accent-color: #f59e0b; /* Amber */
            --danger-color: #ef4444;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            letter-spacing: -1px;
            font-size: 1.5rem;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: var(--text-primary);
        }

        main {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: none;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: #000;
        }

        .btn-primary:hover {
            background-color: #fbbf24;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: var(--glass-bg);
        }

        footer {
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid var(--glass-border);
        }

        /* Tablet/Mobile Adjustments */
        @media (max-width: 768px) {
            header { padding: 1rem; }
            main { padding: 1rem; }
            nav { gap: 1rem; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <div class="logo">EORIS</div>
        <nav>
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Database</a>
            <a href="/scanner" class="{% if request.url.path == '/scanner' %}active{% endif %}">Scanner</a>
            {% if user %}
                <span class="user-greeting" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 600;">Hello, {{ user.username }}</span>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/login" class="{% if request.url.path == '/login' %}active{% endif %}">Login</a>
                <a href="/register" class="{% if request.url.path == '/register' %}active{% endif %}">Register</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        &copy; 2026 EORIS. Explosive Ordnance Recognition & Identification System.
    </footer>

    <script src="/static/js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js')
                .then(reg => console.log('Service Worker Registered'))
                .catch(err => console.log('Service Worker Failed', err));
        }
    </script>
</body>
</html>
